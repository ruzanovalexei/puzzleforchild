name: puzzleforchild
description: Мозаика. Животные
version: 1.0.3
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.0.15
  yandex_mobileads: ^7.18.0
  path: ^1.8.3
  # ... остальные зависимости ...

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
